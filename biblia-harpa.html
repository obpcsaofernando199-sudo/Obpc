<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia e Harpa Cristã | OBPC Jardim São Fernando</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0b1626;
    --navy:#122238;
    --navy-light:#1b3350;
    --gold:#cda44e;
    --gold-bright:#e6c774;
    --parchment:#f3ead9;
    --text-soft:#c8d2df;
    --line:rgba(205,164,78,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(205,164,78,0.08), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(205,164,78,0.06), transparent 55%),
      var(--navy-deep);
    color:var(--parchment);
    font-family:'Source Sans 3', sans-serif;
    min-height:100vh;
  }
  header.top{
    text-align:center;
    padding:38px 20px 22px;
    border-bottom:1px solid var(--line);
  }
  header.top h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(24px,5vw,34px);
    color:var(--gold-bright);
    margin:0 0 6px;
    letter-spacing:0.3px;
  }
  header.top p{
    margin:0;
    color:var(--text-soft);
    font-size:14px;
    letter-spacing:0.5px;
  }
  nav.tabs{
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
    padding:18px 12px 0;
  }
  nav.tabs button{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-soft);
    padding:10px 18px;
    border-radius:999px;
    font-family:'Fraunces', serif;
    font-size:15px;
    cursor:pointer;
    transition:all .25s ease;
  }
  nav.tabs button.active{
    background:linear-gradient(135deg, var(--gold), var(--gold-bright));
    color:var(--navy-deep);
    border-color:transparent;
    font-weight:600;
  }
  main{
    max-width:760px;
    margin:0 auto;
    padding:26px 18px 70px;
  }
  .panel{display:none;animation:fade .35s ease;}
  .panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .card{
    background:linear-gradient(180deg, var(--navy-light), var(--navy));
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    margin-bottom:16px;
  }
  select, input[type="text"]{
    width:100%;
    background:var(--navy-deep);
    border:1px solid var(--line);
    color:var(--parchment);
    padding:12px 14px;
    border-radius:10px;
    font-size:15px;
    font-family:'Source Sans 3', sans-serif;
    margin-bottom:10px;
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{
    background:linear-gradient(135deg, var(--gold), var(--gold-bright));
    color:var(--navy-deep);
    border:none;
    padding:11px 16px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-family:'Source Sans 3', sans-serif;
    font-size:14px;
  }
  .btn.ghost{
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-bright);
  }
  .btn:disabled{opacity:.4;cursor:default;}

  .verse{
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    line-height:1.65;
    font-size:16px;
  }
  .verse:last-child{border-bottom:none;}
  .verse b{color:var(--gold-bright);margin-right:6px;font-family:'Fraunces',serif;}

  .chapter-title, .hymn-title{
    font-family:'Fraunces', serif;
    color:var(--gold-bright);
    font-size:20px;
    margin:0 0 12px;
  }

  .status{
    text-align:center;
    color:var(--text-soft);
    padding:24px 10px;
    font-size:14px;
  }

  .hymn-list{max-height:340px;overflow-y:auto;margin-top:4px;}
  .hymn-item{
    padding:10px 8px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
    font-size:15px;
    display:flex;
    justify-content:space-between;
  }
  .hymn-item:hover{background:rgba(205,164,78,0.08);}
  .hymn-item span.num{color:var(--gold-bright);font-weight:600;margin-right:8px;}

  .coro{
    background:rgba(205,164,78,0.08);
    border-left:3px solid var(--gold);
    padding:10px 14px;
    margin-bottom:14px;
    border-radius:0 8px 8px 0;
    font-style:italic;
    line-height:1.6;
  }
  .coro-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--gold-bright);
    display:block;
    margin-bottom:4px;
    font-style:normal;
  }

  /* Quiz */
  .quiz-progress{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--text-soft);
    margin-bottom:14px;
  }
  .quiz-question{
    font-family:'Fraunces', serif;
    font-size:19px;
    margin-bottom:18px;
    line-height:1.5;
  }
  .quiz-option{
    display:block;
    width:100%;
    text-align:left;
    background:var(--navy-deep);
    border:1px solid var(--line);
    color:var(--parchment);
    padding:13px 16px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    font-size:15px;
    font-family:'Source Sans 3', sans-serif;
    transition:all .2s ease;
  }
  .quiz-option:hover{border-color:var(--gold);}
  .quiz-option.correct{background:rgba(80,160,100,0.25);border-color:#5fa878;}
  .quiz-option.wrong{background:rgba(190,80,80,0.25);border-color:#c06060;}
  .quiz-option:disabled{cursor:default;}

  .quiz-result{
    text-align:center;
    padding:30px 10px;
  }
  .quiz-result .score{
    font-family:'Fraunces', serif;
    font-size:40px;
    color:var(--gold-bright);
    margin-bottom:6px;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:8px;}
</style>
</head>
<body>

<header class="top">
  <h1>Bíblia &amp; Harpa Cristã</h1>
  <p>OBPC · Congregação Jardim São Fernando</p>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="biblia">Bíblia</button>
  <button class="tab-btn" data-tab="harpa">Harpa Cristã</button>
  <button class="tab-btn" data-tab="quiz">Quiz Bíblico</button>
</nav>

<main>

  <!-- BÍBLIA -->
  <section id="tab-biblia" class="panel active">
    <div class="card">
      <select id="bkSelect"><option>Carregando livros...</option></select>
      <div class="row2">
        <select id="chSelect"><option>Capítulo</option></select>
        <button class="btn" id="goChapter">Ir</button>
      </div>
      <input type="text" id="bibleSearch" placeholder="Buscar palavra ou frase na Bíblia...">
      <button class="btn ghost" id="doSearch" style="width:100%;">Buscar</button>
    </div>
    <div class="card" id="bibleContent">
      <div class="status">Abrindo a Bíblia (Almeida Revista e Corrigida)... isso só demora na primeira vez.</div>
    </div>
  </section>

  <!-- HARPA -->
  <section id="tab-harpa" class="panel">
    <div class="card">
      <input type="text" id="harpaSearch" placeholder="Buscar por número ou nome do hino...">
      <div class="hymn-list" id="hymnList"></div>
    </div>
    <div class="card" id="hymnContent">
      <div class="status">Escolha um hino na lista acima.</div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="tab-quiz" class="panel">
    <div class="card" id="quizCard">
      <div class="status">Carregando o quiz...</div>
    </div>
  </section>

</main>

<script>
/* ================= DADOS ================= */
const BIBLE_URL = "https://raw.githubusercontent.com/AlanMartines/bibliasemfronteiras/master/almeidarc/almeida_rc.json";
const HARPA_URL = "https://raw.githubusercontent.com/DanielLiberato/Harpa-Crista-JSON-640-Hinos-Completa/main/harpa_crista_640_hinos.json";
const DATA_VERSION = "v1";

let bibleVerses = [];      // lista plana {book_name, book, chapter, verse, text}
let bibleBooks = [];       // nomes únicos, na ordem
let harpaData = {};        // objeto por número do hino

/* ================= TABS ================= */
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
  });
});

/* ================= CACHE HELPER ================= */
async function loadCached(key, url){
  try{
    const cached = localStorage.getItem(key);
    if(cached){
      return JSON.parse(cached);
    }
  }catch(e){ /* segue para buscar de novo */ }

  const res = await fetch(url);
  if(!res.ok) throw new Error("Falha ao carregar dados ("+res.status+")");
  const data = await res.json();
  try{
    localStorage.setItem(key, JSON.stringify(data));
  }catch(e){ /* se não couber no localStorage, segue sem cache */ }
  return data;
}

/* ================= BÍBLIA ================= */
async function initBible(){
  try{
    const raw = await loadCached("obpc_bible_"+DATA_VERSION, BIBLE_URL);
    bibleVerses = raw.verses;
    bibleBooks = [...new Set(bibleVerses.map(v=>v.book_name))];

    const bkSelect = document.getElementById("bkSelect");
    bkSelect.innerHTML = bibleBooks.map(b=>`<option value="${b}">${b}</option>`).join("");
    bkSelect.addEventListener("change", fillChapters);
    fillChapters();

    document.getElementById("goChapter").addEventListener("click", showChapter);
    document.getElementById("doSearch").addEventListener("click", searchBible);
    document.getElementById("bibleSearch").addEventListener("keydown", e=>{
      if(e.key==="Enter") searchBible();
    });

    showChapter();
  }catch(err){
    document.getElementById("bibleContent").innerHTML =
      `<div class="status">Não consegui carregar a Bíblia agora. Verifique a internet e tente novamente.<br><small>${err.message}</small></div>`;
  }
}

function fillChapters(){
  const book = document.getElementById("bkSelect").value;
  const chapters = [...new Set(bibleVerses.filter(v=>v.book_name===book).map(v=>v.chapter))];
  const chSelect = document.getElementById("chSelect");
  chSelect.innerHTML = chapters.map(c=>`<option value="${c}">${c}</option>`).join("");
}

function showChapter(){
  const book = document.getElementById("bkSelect").value;
  const chapter = parseInt(document.getElementById("chSelect").value);
  const verses = bibleVerses.filter(v=>v.book_name===book && v.chapter===chapter);
  const html = `<div class="chapter-title">${book} ${chapter}</div>` +
    verses.map(v=>`<div class="verse"><b>${v.verse}</b>${escapeHtml(v.text)}</div>`).join("");
  document.getElementById("bibleContent").innerHTML = html || `<div class="status">Capítulo não encontrado.</div>`;
}

function searchBible(){
  const term = document.getElementById("bibleSearch").value.trim().toLowerCase();
  if(term.length < 3){
    document.getElementById("bibleContent").innerHTML = `<div class="status">Digite pelo menos 3 letras para buscar.</div>`;
    return;
  }
  const results = bibleVerses.filter(v=>v.text.toLowerCase().includes(term)).slice(0,80);
  if(results.length===0){
    document.getElementById("bibleContent").innerHTML = `<div class="status">Nenhum versículo encontrado com "${escapeHtml(term)}".</div>`;
    return;
  }
  const html = `<div class="chapter-title">Resultados para "${escapeHtml(term)}" (${results.length})</div>` +
    results.map(v=>`<div class="verse"><b>${v.book_name} ${v.chapter}:${v.verse}</b><br>${escapeHtml(v.text)}</div>`).join("");
  document.getElementById("bibleContent").innerHTML = html;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

/* ================= HARPA ================= */
async function initHarpa(){
  try{
    harpaData = await loadCached("obpc_harpa_"+DATA_VERSION, HARPA_URL);
    renderHymnList(Object.keys(harpaData).filter(k=>k!=="-1").map(Number).sort((a,b)=>a-b));

    document.getElementById("harpaSearch").addEventListener("input", ()=>{
      const term = document.getElementById("harpaSearch").value.trim().toLowerCase();
      const nums = Object.keys(harpaData).filter(k=>k!=="-1").map(Number).sort((a,b)=>a-b);
      const filtered = nums.filter(n=>{
        const title = (harpaData[n].hino||"").toLowerCase();
        return title.includes(term) || String(n)===term;
      });
      renderHymnList(filtered);
    });
  }catch(err){
    document.getElementById("hymnList").innerHTML = "";
    document.getElementById("hymnContent").innerHTML =
      `<div class="status">Não consegui carregar a Harpa Cristã agora.<br><small>${err.message}</small></div>`;
  }
}

function renderHymnList(numbers){
  const list = document.getElementById("hymnList");
  list.innerHTML = numbers.map(n=>{
    const h = harpaData[n];
    const title = h.hino ? h.hino.replace(/^\d+\s*-\s*/, "") : "Hino "+n;
    return `<div class="hymn-item" data-num="${n}"><span><span class="num">${n}</span>${escapeHtml(title)}</span></div>`;
  }).join("");
  list.querySelectorAll(".hymn-item").forEach(el=>{
    el.addEventListener("click", ()=>showHymn(el.dataset.num));
  });
}

function showHymn(num){
  const h = harpaData[num];
  if(!h) return;
  let html = `<div class="hymn-title">${escapeHtml(h.hino || ("Hino "+num))}</div>`;
  const verseKeys = Object.keys(h.verses||{}).sort((a,b)=>Number(a)-Number(b));
  verseKeys.forEach(k=>{
    html += `<div class="verse"><b>${k}</b>${(h.verses[k]||"").replace(/<br\s*\/?>/gi,"<br>")}</div>`;
    if(h.coro){
      html += `<div class="coro"><span class="coro-label">Coro</span>${h.coro.replace(/<br\s*\/?>/gi,"<br>")}</div>`;
    }
  });
  if(!h.coro && verseKeys.length===0){
    html += `<div class="status">Letra não disponível para este hino.</div>`;
  }
  document.getElementById("hymnContent").innerHTML = html;
}

/* ================= QUIZ BÍBLICO ================= */
const quizBank = [
  {q:"Quem construiu a arca antes do dilúvio?", options:["Abraão","Noé","Moisés","Jonas"], a:1},
  {q:"Quantos dias e noites choveu durante o dilúvio?", options:["7","40","70","100"], a:1},
  {q:"Quem foi vendido pelos próprios irmãos como escravo no Egito?", options:["Davi","José","Josué","Benjamim"], a:1},
  {q:"Qual profeta foi engolido por um grande peixe?", options:["Elias","Eliseu","Jonas","Daniel"], a:2},
  {q:"Quem liderou o povo de Israel na saída do Egito?", options:["Moisés","Arão","Josué","Calebe"], a:0},
  {q:"Quantos mandamentos Deus deu a Moisés no monte Sinai?", options:["7","10","12","15"], a:1},
  {q:"Quem matou o gigante Golias?", options:["Saul","Salomão","Davi","Jônatas"], a:2},
  {q:"Qual era a profissão de Jesus antes do ministério?", options:["Pescador","Carpinteiro","Pastor","Agricultor"], a:1},
  {q:"Quem traiu Jesus por trinta moedas de prata?", options:["Pedro","Tomé","Judas Iscariotes","Filipe"], a:2},
  {q:"Em que cidade Jesus nasceu?", options:["Nazaré","Jerusalém","Belém","Cafarnaum"], a:2},
  {q:"Quantos discípulos Jesus escolheu como apóstolos?", options:["7","10","12","15"], a:2},
  {q:"Quem negou Jesus três vezes antes do galo cantar?", options:["João","Pedro","Tiago","André"], a:1},
  {q:"Qual é o primeiro livro da Bíblia?", options:["Êxodo","Gênesis","Levítico","Salmos"], a:1},
  {q:"Qual é o último livro do Novo Testamento?", options:["Judas","Apocalipse","2 Pedro","Hebreus"], a:1},
  {q:"Quem foi lançado na cova dos leões?", options:["Daniel","Ezequiel","Jeremias","Isaías"], a:0},
  {q:"Quantos livros tem o Novo Testamento?", options:["27","39","66","24"], a:0},
  {q:"Quem foi o rei conhecido pela sua sabedoria, filho de Davi?", options:["Salomão","Roboão","Ezequias","Josias"], a:0},
  {q:"Em que monte Jesus foi crucificado?", options:["Monte Sinai","Monte Calvário (Gólgota)","Monte das Oliveiras","Monte Carmelo"], a:1},
  {q:"Quem escreveu grande parte das epístolas do Novo Testamento?", options:["Pedro","Paulo","João","Tiago"], a:1},
  {q:"Qual mulher se tornou uma estátua de sal?", options:["Sara","A esposa de Ló","Rebeca","Raquel"], a:1},
  {q:"Quem foi o pai da fé, chamado por Deus para deixar sua terra?", options:["Isaque","Jacó","Abraão","Ló"], a:2},
  {q:"Qual é considerado o menor versículo da Bíblia?", options:["'Jesus chorou'","'Deus é amor'","'Orai sem cessar'","'Vigiai e orai'"], a:0},
  {q:"Quem transformou água em vinho nas bodas de Caná?", options:["João Batista","Jesus","Pedro","Filipe"], a:1},
  {q:"Quantos dias Jesus jejuou no deserto?", options:["7","30","40","50"], a:2},
  {q:"Quem era o rei quando Jesus nasceu, segundo Mateus?", options:["Herodes","César Augusto","Pilatos","Davi"], a:0},
  {q:"Qual apóstolo era conhecido como 'o discípulo amado'?", options:["Pedro","Tiago","João","André"], a:2},
  {q:"Quem foi a mãe de Jesus?", options:["Isabel","Ana","Maria","Marta"], a:2},
  {q:"Qual foi a primeira praga do Egito, segundo Êxodo?", options:["Gafanhotos","Água transformada em sangue","Trevas","Granizo"], a:1},
  {q:"Quem foi jogado numa fornalha ardente e não se queimou, junto com dois amigos?", options:["Daniel","Sadraque, Mesaque e Abednego","Elias","José"], a:1},
  {q:"Qual é considerado o livro mais longo da Bíblia em número de capítulos?", options:["Gênesis","Salmos","Isaías","Jeremias"], a:1}
];

let quizState = { order:[], index:0, score:0, total:10, answered:false };

function initQuiz(){
  quizState.order = [...quizBank.keys()].sort(()=>Math.random()-0.5).slice(0, Math.min(quizState.total, quizBank.length));
  quizState.index = 0;
  quizState.score = 0;
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const card = document.getElementById("quizCard");
  if(quizState.index >= quizState.order.length){
    card.innerHTML = `
      <div class="quiz-result">
        <div class="score">${quizState.score} / ${quizState.order.length}</div>
        <p>Você concluiu o quiz bíblico!</p>
        <button class="btn" id="restartQuiz">Jogar novamente</button>
      </div>`;
    document.getElementById("restartQuiz").addEventListener("click", initQuiz);
    return;
  }
  const q = quizBank[quizState.order[quizState.index]];
  quizState.answered = false;
  card.innerHTML = `
    <div class="quiz-progress"><span>Pergunta ${quizState.index+1} de ${quizState.order.length}</span><span>Pontos: ${quizState.score}</span></div>
    <div class="quiz-question">${escapeHtml(q.q)}</div>
    ${q.options.map((opt,i)=>`<button class="quiz-option" data-i="${i}">${escapeHtml(opt)}</button>`).join("")}
  `;
  card.querySelectorAll(".quiz-option").forEach(btn=>{
    btn.addEventListener("click", ()=>answerQuiz(Number(btn.dataset.i), q));
  });
}

function answerQuiz(choice, q){
  if(quizState.answered) return;
  quizState.answered = true;
  const buttons = document.querySelectorAll(".quiz-option");
  buttons.forEach((btn,i)=>{
    btn.disabled = true;
    if(i===q.a) btn.classList.add("correct");
    else if(i===choice) btn.classList.add("wrong");
  });
  if(choice===q.a) quizState.score++;
  setTimeout(()=>{
    quizState.index++;
    renderQuizQuestion();
  }, 1100);
}

/* ================= INÍCIO ================= */
initBible();
initHarpa();
initQuiz();
</script>

</body>
</html>
