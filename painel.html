<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Banner — OBPC São Fernando</title>
<style>
/* ─── BASE (copie para dentro do painel.html se ainda não tiver) ─── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;color:#1a2535;font-size:15px;}
:root{--azul:#1E3A5F;--azul2:#3B9BD6;--verde:#27ae60;--verm:#e74c3c;--borda:#dde2ea;--muted:#6b7a90;}
label{font-size:.78rem;font-weight:600;color:var(--muted);display:block;margin:.5rem 0 .2rem;}
input,textarea,select{width:100%;padding:.5rem .75rem;border:1.5px solid var(--borda);border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff;color:#1a2535;}
input:focus,textarea:focus{outline:none;border-color:var(--azul2);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:.5rem 1rem;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;}
.bp{background:var(--azul);color:#fff;}
.bs{background:var(--verde);color:#fff;}
.bd{background:var(--verm);color:#fff;}
.card{background:#fff;border-radius:10px;padding:1rem;margin-bottom:.7rem;box-shadow:0 1px 5px rgba(0,0,0,.07);}
h2{font-size:1rem;font-weight:700;color:var(--azul);margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--azul2);}

/* ─── BANNER ABA ─── */
.aba-banner-layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start;}
@media(max-width:700px){.aba-banner-layout{grid-template-columns:1fr;}}

/* Upload área */
.uparea{border:2px dashed var(--borda);border-radius:12px;padding:1rem;text-align:center;background:#fafbfd;cursor:pointer;transition:.2s;position:relative;}
.uparea:hover{border-color:var(--azul2);background:#f0f7ff;}
.uparea input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.uparea p{font-size:.78rem;color:var(--muted);margin:0;}
.uparea span{font-size:1.5rem;display:block;margin-bottom:.3rem;}
.up-status{font-size:.75rem;margin-top:.4rem;min-height:1rem;color:var(--azul2);}
.progress-bar-wrap{width:100%;height:6px;background:#e2e8f0;border-radius:6px;overflow:hidden;margin:.4rem 0;display:none;}
.progress-bar{height:100%;background:var(--azul2);width:0%;transition:width .3s;border-radius:6px;}

/* Phone mockup */
.phone-mockup{
  width:220px;margin:0 auto;
  background:#0a0a0a;border-radius:36px;
  padding:10px;
  box-shadow:0 8px 40px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.08);
  position:relative;
}
.phone-notch{
  width:70px;height:22px;background:#0a0a0a;
  border-radius:0 0 14px 14px;
  margin:0 auto 6px;
  position:relative;z-index:2;
}
.phone-screen{
  background:#f2eeea;
  border-radius:28px;
  overflow:hidden;
  min-height:380px;
  position:relative;
}
.phone-header{
  background:linear-gradient(180deg,#ede5f7 0%,#dce7f5 100%);
  padding:.6rem .8rem;
  text-align:center;
  border-bottom:1px solid #c8bedd;
}
.phone-church-name{
  font-size:.65rem;font-weight:700;color:#1e1830;
  font-family:Georgia,serif;letter-spacing:.04em;
}
.phone-banner-preview{
  position:relative;width:100%;background:#e8e2da;
  min-height:110px;overflow:hidden;
}
.phone-banner-preview img,
.phone-banner-preview video{width:100%;height:auto;max-height:150px;display:block;object-fit:cover;}
.phone-banner-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(30,20,50,.72),transparent);
  padding:.5rem .6rem .4rem;
}
.phone-banner-eyebrow{font-size:.42rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.75);font-weight:600;}
.phone-banner-title{font-size:.72rem;font-weight:700;color:#fff;font-family:Georgia,serif;line-height:1.2;}
.phone-banner-sub{font-size:.52rem;color:rgba(255,255,255,.8);margin-top:.15rem;}
.phone-sec-label{
  font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:#6b5b8c;padding:.5rem .6rem .2rem;display:flex;align-items:center;gap:.3rem;
}
.phone-sec-label::after{content:'';flex:1;height:.5px;background:#d8d0c6;}
.phone-card-mock{background:#fff;border-radius:8px;margin:.4rem .5rem;padding:.5rem .6rem;border:1px solid #e0d8d0;font-size:.52rem;color:#7a7085;}
.phone-bar{height:2px;background:#c8bedd;border-radius:2px;margin:.2rem .5rem;}

/* status badge */
.status-live{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;color:var(--verde);background:#e8f5e9;border-radius:20px;padding:3px 10px;border:1px solid #c8e6c9;}
.status-empty{color:var(--muted);font-size:.75rem;}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 1.4s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* tipo btn */
.tipo-btns{display:flex;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap;}
.tipo-btn{padding:.35rem .8rem;border:1.5px solid var(--borda);border-radius:20px;background:#fff;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s;}
.tipo-btn.sel{background:var(--azul);color:#fff;border-color:var(--azul);}

/* action btns */
.banner-actions{display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap;}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     ABA BANNER — cole este bloco no painel.html
     
     1. No nav, adicione:
        <div class="grp">Conteúdo</div>
        <a onclick="ir('ban',this)">🖼️ Banner</a>
     
     2. No main, adicione a div abaixo:
     
     3. Na função ir(), adicione:
        else if(id==='ban') rndBan();
     
     4. Cole as funções JS no final do <script> existente
     ═══════════════════════════════════════════ -->

<div id="aba-ban" class="aba" style="display:block;"><!-- remova style no painel real -->
  <h2>🖼️ Banner — Próximo Culto</h2>

  <div class="aba-banner-layout">

    <!-- COLUNA ESQUERDA: formulário -->
    <div>
      <!-- STATUS -->
      <div class="card" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
        <div>
          <div style="font-weight:700;font-size:.88rem;margin-bottom:.2rem">Status do Banner</div>
          <div id="ban-status-txt" class="status-empty">Nenhum banner publicado</div>
        </div>
        <button class="btn bd" id="ban-del-btn" onclick="delBanner()" style="display:none">🗑 Remover Banner</button>
      </div>

      <!-- TIPO -->
      <div class="card">
        <label>Tipo de mídia</label>
        <div class="tipo-btns">
          <button class="tipo-btn sel" id="tipo-img" onclick="setTipo('img')">📷 Imagem</button>
          <button class="tipo-btn" id="tipo-video" onclick="setTipo('video')">🎬 Vídeo</button>
          <button class="tipo-btn" id="tipo-yt" onclick="setTipo('yt')">▶ YouTube</button>
        </div>

        <!-- UPLOAD imagem/vídeo -->
        <div id="ban-upload-area">
          <label>Foto ou Vídeo do celular / PC</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.5rem;">
            <div class="uparea" onclick="document.getElementById('ban-f1').click()">
              <span>📁</span><p>Arquivo</p>
              <input type="file" id="ban-f1" accept="image/*,video/*" onchange="banUp(this)">
            </div>
            <div class="uparea" onclick="document.getElementById('ban-f2').click()">
              <span>📷</span><p>Tirar Foto</p>
              <input type="file" id="ban-f2" accept="image/*" capture="environment" onchange="banUp(this)">
            </div>
            <div class="uparea" onclick="document.getElementById('ban-f3').click()">
              <span>🎬</span><p>Gravar Vídeo</p>
              <input type="file" id="ban-f3" accept="video/*" capture="environment" onchange="banUp(this)">
            </div>
          </div>
          <div class="progress-bar-wrap" id="ban-progress-wrap">
            <div class="progress-bar" id="ban-progress-bar"></div>
          </div>
          <div class="up-status" id="ban-up-status"></div>
          <!-- Preview mídia -->
          <div id="ban-media-pv" style="margin-top:.4rem;border-radius:8px;overflow:hidden;background:#f0f4f8;display:none;"></div>
        </div>

        <!-- URL YouTube -->
        <div id="ban-yt-area" style="display:none;">
          <label>Link YouTube (vídeo ou Short)</label>
          <input id="ban-yt-url" placeholder="https://youtu.be/..." oninput="banYtPreview(this.value)">
          <div id="ban-yt-pv" style="margin-top:.5rem;border-radius:8px;overflow:hidden;background:#000;display:none;">
            <img id="ban-yt-thumb" src="" style="width:100%;display:block;">
          </div>
        </div>
      </div>

      <!-- TEXTOS do overlay -->
      <div class="card">
        <label>Olho (texto pequeno acima do título — opcional)</label>
        <input id="ban-eyebrow" placeholder="ex: Domingo · 18h30" oninput="banPreviewUpdate()">
        <label style="margin-top:.6rem">Título do culto</label>
        <input id="ban-titulo" placeholder="ex: Culto de Adoração" oninput="banPreviewUpdate()">
        <label style="margin-top:.6rem">Subtítulo / Data</label>
        <input id="ban-sub" placeholder="ex: 1 de junho · 18h30 · Igreja Sede" oninput="banPreviewUpdate()">
      </div>

      <!-- AÇÕES -->
      <div class="banner-actions">
        <button class="btn bs" onclick="salvarBanner()">📤 Publicar Banner</button>
        <button class="btn bp" style="background:#64748b" onclick="limparBanner()">✕ Limpar</button>
      </div>
      <div id="ban-ok" style="display:none;color:var(--verde);font-size:.82rem;margin-top:.4rem;font-weight:600">✅ Banner publicado!</div>
    </div>

    <!-- COLUNA DIREITA: preview celular -->
    <div style="position:sticky;top:70px;">
      <label style="text-align:center;display:block;margin-bottom:.6rem;">Preview — como aparece no site</label>
      <div class="phone-mockup">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <!-- Header mockup -->
          <div class="phone-header">
            <div class="phone-church-name" id="pv-church-name">OBPC São Fernando</div>
          </div>
          <!-- Banner preview -->
          <div class="phone-banner-preview" id="pv-banner-area">
            <div style="display:flex;align-items:center;justify-content:center;min-height:100px;font-size:.65rem;color:#a89fb0;">
              📷 Nenhuma mídia
            </div>
          </div>
          <!-- Resto da tela mockado -->
          <div class="phone-sec-label">✨ Próximo Culto</div>
          <div class="phone-card-mock">📋 Domingo — Culto de Ensino...</div>
          <div class="phone-bar"></div>
          <div class="phone-sec-label">📋 Escala de Hoje</div>
          <div class="phone-card-mock">Nenhum culto programado...</div>
        </div>
      </div>
      <p style="text-align:center;font-size:.68rem;color:var(--muted);margin-top:.5rem">Preview em tempo real</p>
    </div>

  </div>
</div>

<script>
// ═══ DB — mesmo padrão do painel.html ═══
var FB='https://fcosta-31125-default-rtdb.firebaseio.com/obpc';
var DB={
  g:function(k){try{return JSON.parse(localStorage.getItem('obpc_'+k));}catch(e){return null;}},
  s:function(k,v){localStorage.setItem('obpc_'+k,JSON.stringify(v));fetch(FB+'/'+k+'.json',{method:'PUT',body:JSON.stringify(v),headers:{'Content-Type':'application/json'}}).catch(function(){});}
};

// ═══ CLOUDINARY upload para vídeos ═══
async function upCloud(file,onProg){
  return new Promise(function(res){
    var xhr=new XMLHttpRequest();var fd=new FormData();
    fd.append('file',file);fd.append('upload_preset','fcosta_imoveis');
    fd.append('folder','obpc_banner');fd.append('resource_type','video');
    xhr.open('POST','https://api.cloudinary.com/v1_1/dpquob8gh/video/upload');
    xhr.timeout=600000;
    xhr.upload.onprogress=function(e){if(e.lengthComputable&&onProg)onProg(Math.round(e.loaded/e.total*100));};
    xhr.onload=function(){try{var d=JSON.parse(xhr.responseText);d.secure_url?res(d.secure_url):res(null);}catch(e){res(null);}};
    xhr.onerror=function(){res(null);};xhr.ontimeout=function(){res(null);};
    xhr.send(fd);
  });
}

// ═══ ImgBB upload para imagens ═══
async function upImgBB(file){
  var key=localStorage.getItem('obpc_imgbb_key')||'';
  if(!key||key.length<10)return null;
  var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});
  try{
    var fd=new FormData();fd.append('image',b64);
    var resp=await fetch('https://api.imgbb.com/1/upload?key='+key,{method:'POST',body:fd});
    var data=await resp.json();
    return data.success?data.data.url:null;
  }catch(e){return null;}
}

// ═══ Reduz foto antes de enviar ═══
async function reduzFoto(file){
  if(file.size<800*1024)return file;
  return new Promise(function(res){
    var img=new Image();var url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var max=1600;var w=img.width;var h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(function(b){res(b?new File([b],file.name,{type:'image/jpeg'}):file);},'image/jpeg',0.82);
    };
    img.onerror=function(){URL.revokeObjectURL(url);res(file);};
    img.src=url;
  });
}

// ═══ Estado local ═══
var _banTipo='img';
var _banSrc='';
var _banTp='img';

function setTipo(t){
  _banTipo=t;
  document.querySelectorAll('.tipo-btn').forEach(function(b){b.classList.remove('sel');});
  document.getElementById('tipo-'+t).classList.add('sel');
  document.getElementById('ban-upload-area').style.display=(t==='yt')?'none':'block';
  document.getElementById('ban-yt-area').style.display=(t==='yt')?'block':'none';
  if(t!=='yt'){_banSrc='';_banTp=t;banPreviewUpdate();}
}

async function banUp(inp){
  var f=inp.files[0];if(!f)return;
  var isV=f.type.startsWith('video/');
  var sts=document.getElementById('ban-up-status');
  var pw=document.getElementById('ban-progress-wrap');
  var pb=document.getElementById('ban-progress-bar');
  var pv=document.getElementById('ban-media-pv');
  var mbSize=(f.size/1024/1024).toFixed(1);
  sts.textContent=(isV?'📹':'📷')+' '+f.name+' ('+mbSize+'MB) — enviando...';
  pw.style.display='block';pb.style.width='0%';pb.style.background='#3B9BD6';
  pv.style.display='none';pv.innerHTML='';
  try{
    var url='';
    if(isV){
      url=await upCloud(f,function(p){pb.style.width=p+'%';});
      _banTp='video';
    } else {
      pb.style.width='40%';
      var fOtim=await reduzFoto(f);
      url=await upImgBB(fOtim);
      _banTp='img';
      pb.style.width='100%';
    }
    if(url){
      _banSrc=url;
      pb.style.background='#27ae60';
      sts.textContent='✅ Enviado! Clique em "Publicar Banner".';
      // Mostra preview
      pv.style.display='block';
      if(isV){
        var v=document.createElement('video');v.src=url;v.controls=true;v.preload='metadata';v.playsInline=true;
        v.style.cssText='width:100%;border-radius:8px;display:block;max-height:180px;background:#000';
        pv.appendChild(v);
      } else {
        var img=document.createElement('img');img.src=url;
        img.style.cssText='width:100%;border-radius:8px;display:block;max-height:180px;object-fit:contain;background:#f0f4f8';
        pv.appendChild(img);
      }
      banPreviewUpdate();
    } else {
      // Fallback: usa blob local para preview (não salva no firebase)
      var blobUrl=URL.createObjectURL(f);
      _banSrc=blobUrl;_banTp=isV?'video':'img';
      pb.style.background='#e67e22';
      sts.innerHTML='⚠️ Upload remoto falhou. <strong>Configure a ImgBB key</strong> em Ferramentas → Migrar para salvar imagens.';
      pv.style.display='block';
      if(isV){var v2=document.createElement('video');v2.src=blobUrl;v2.controls=true;v2.preload='metadata';v2.style.cssText='width:100%;border-radius:8px;max-height:180px;background:#000';pv.appendChild(v2);}
      else{var img2=document.createElement('img');img2.src=blobUrl;img2.style.cssText='width:100%;border-radius:8px;max-height:180px;object-fit:contain;background:#f0f4f8';pv.appendChild(img2);}
      banPreviewUpdate();
    }
  } catch(e){
    sts.textContent='❌ Erro: '+e.message;pb.style.background='#e74c3c';
  }
  setTimeout(function(){pw.style.display='none';},3000);
  try{inp.value='';}catch(e){}
}

function banYtPreview(url){
  var yid=(url||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
  var pv=document.getElementById('ban-yt-pv');
  var thumb=document.getElementById('ban-yt-thumb');
  if(yid){
    _banSrc=url.trim();_banTp='yt';
    thumb.src='https://img.youtube.com/vi/'+yid[1]+'/hqdefault.jpg';
    pv.style.display='block';
    banPreviewUpdate();
  } else {
    pv.style.display='none';
    _banSrc='';
  }
}

function banPreviewUpdate(){
  var area=document.getElementById('pv-banner-area');
  if(!area)return;
  var titulo=document.getElementById('ban-titulo').value;
  var sub=document.getElementById('ban-sub').value;
  var eyebrow=document.getElementById('ban-eyebrow').value;
  area.innerHTML='';
  if(!_banSrc){
    area.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100px;font-size:.62rem;color:#a89fb0;">📷 Nenhuma mídia</div>';
    return;
  }
  var yid=(_banSrc||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
  if(yid){
    var img=document.createElement('img');img.src='https://img.youtube.com/vi/'+yid[1]+'/hqdefault.jpg';
    img.style.cssText='width:100%;max-height:130px;object-fit:cover;display:block;';area.appendChild(img);
  } else if(_banTp==='video'){
    var v=document.createElement('video');v.src=_banSrc;v.muted=true;v.preload='metadata';
    v.style.cssText='width:100%;max-height:130px;object-fit:cover;display:block;background:#000';area.appendChild(v);
  } else {
    var img2=document.createElement('img');img2.src=_banSrc;
    img2.style.cssText='width:100%;max-height:130px;object-fit:cover;display:block;';area.appendChild(img2);
  }
  if(titulo||sub){
    var ov=document.createElement('div');ov.className='phone-banner-overlay';
    ov.innerHTML=(eyebrow?'<div class="phone-banner-eyebrow">'+eyebrow+'</div>':'')
      +(titulo?'<div class="phone-banner-title">'+titulo+'</div>':'')
      +(sub?'<div class="phone-banner-sub">'+sub+'</div>':'');
    area.appendChild(ov);
  }
}

function salvarBanner(){
  if(!_banSrc){alert('Adicione uma imagem, vídeo ou link YouTube primeiro.');return;}
  var d={
    src:_banSrc,tp:_banTp,
    titulo:document.getElementById('ban-titulo').value,
    sub:document.getElementById('ban-sub').value,
    eyebrow:document.getElementById('ban-eyebrow').value,
    ts:Date.now()
  };
  DB.s('banner',d);
  var ok=document.getElementById('ban-ok');
  ok.style.display='block';
  setTimeout(function(){ok.style.display='none';},3000);
  rndBan();
}

function delBanner(){
  if(!confirm('Remover o banner atual?'))return;
  DB.s('banner',{});
  _banSrc='';_banTp='img';
  document.getElementById('ban-media-pv').style.display='none';
  document.getElementById('ban-media-pv').innerHTML='';
  document.getElementById('ban-titulo').value='';
  document.getElementById('ban-sub').value='';
  document.getElementById('ban-eyebrow').value='';
  document.getElementById('ban-yt-url').value='';
  document.getElementById('ban-yt-pv').style.display='none';
  document.getElementById('ban-up-status').textContent='';
  banPreviewUpdate();rndBan();
}

function limparBanner(){
  _banSrc='';_banTp='img';
  document.getElementById('ban-media-pv').style.display='none';
  document.getElementById('ban-media-pv').innerHTML='';
  document.getElementById('ban-titulo').value='';
  document.getElementById('ban-sub').value='';
  document.getElementById('ban-eyebrow').value='';
  document.getElementById('ban-yt-url').value='';
  document.getElementById('ban-yt-pv').style.display='none';
  document.getElementById('ban-up-status').textContent='';
  banPreviewUpdate();
}

function rndBan(){
  var d=DB.g('banner')||{};
  var sts=document.getElementById('ban-status-txt');
  var del=document.getElementById('ban-del-btn');
  if(d&&d.src){
    var ts=d.ts?new Date(d.ts).toLocaleString('pt-BR'):'';
    sts.innerHTML='<span class="status-live"><span class="dot-live"></span>Publicado'+(ts?' · '+ts:'')+'</span>';
    del.style.display='inline-flex';
    // Preenche campos com dados salvos
    document.getElementById('ban-titulo').value=d.titulo||'';
    document.getElementById('ban-sub').value=d.sub||'';
    document.getElementById('ban-eyebrow').value=d.eyebrow||'';
    _banSrc=d.src;_banTp=d.tp||'img';
    // Mostra preview da mídia salva
    var pv=document.getElementById('ban-media-pv');
    pv.style.display='block';pv.innerHTML='';
    if(d.tp==='video'||d.tp==='yt'){
      var yid=(d.src).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
      if(yid){
        document.getElementById('ban-yt-url').value=d.src;
        document.getElementById('ban-yt-thumb').src='https://img.youtube.com/vi/'+yid[1]+'/hqdefault.jpg';
        document.getElementById('ban-yt-pv').style.display='block';
        setTipo('yt');
      } else {
        var v2=document.createElement('video');v2.src=d.src;v2.controls=true;v2.preload='metadata';
        v2.style.cssText='width:100%;border-radius:8px;max-height:180px;background:#000;display:block';
        pv.appendChild(v2);setTipo('video');
      }
    } else {
      var img3=document.createElement('img');img3.src=d.src;
      img3.style.cssText='width:100%;border-radius:8px;max-height:180px;object-fit:contain;background:#f0f4f8;display:block';
      pv.appendChild(img3);setTipo('img');
    }
    banPreviewUpdate();
  } else {
    sts.innerHTML='<span class="status-empty">Nenhum banner publicado</span>';
    del.style.display='none';
  }
  // Nome da igreja no preview
  var info=DB.g('info')||{};
  var cn=document.getElementById('pv-church-name');
  if(cn)cn.textContent=info.nome||'OBPC São Fernando';
}

// Inicializa
rndBan();
</script>
</body>
