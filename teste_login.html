<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Login</title>
<style>
body{background:#0d2a14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}
.box{background:rgba(0,0,0,0.5);border:1px solid #c8a84b;border-radius:10px;padding:30px;width:320px;text-align:center;color:#f8f8f6;}
h2{color:#c8a84b;margin-bottom:20px;}
input{width:100%;padding:12px;margin-bottom:10px;background:rgba(255,255,255,0.1);border:1px solid #c8a84b;border-radius:6px;color:#fff;font-size:1rem;}
button{width:100%;padding:13px;background:#c8a84b;border:none;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer;}
#resultado{margin-top:15px;padding:10px;border-radius:6px;display:none;}
.ok{background:rgba(0,200,0,0.2);color:#7dd99a;border:1px solid green;}
.erro{background:rgba(200,0,0,0.2);color:#ff8080;border:1px solid red;}
#painel{display:none;color:#c8a84b;font-size:1.2rem;margin-top:20px;}
</style>
</head>
<body>
<div class="box">
  <h2>Teste Login</h2>
  <input type="text" id="u" placeholder="usuario (sergio)">
  <input type="password" id="s" placeholder="senha (1020)">
  <button onclick="testar()">TESTAR</button>
  <div id="resultado"></div>
  <div id="painel">✅ LOGIN OK! Painel abriria aqui.</div>
</div>
<script>
var USUARIOS = {"sergio":"1020","pastor":"obpc2024","admin":"admin123"};
function testar() {
  var u = document.getElementById('u').value.trim().toLowerCase();
  var s = document.getElementById('s').value;
  var r = document.getElementById('resultado');
  if (USUARIOS[u] && USUARIOS[u] === s) {
    r.className = 'ok';
    r.textContent = 'Login correto! localStorage: ' + (typeof localStorage !== 'undefined' ? 'OK' : 'FALHA');
    r.style.display = 'block';
    document.getElementById('painel').style.display = 'block';
  } else {
    r.className = 'erro';
    r.textContent = 'Usuário ou senha errado. u=' + u + ' s.length=' + s.length;
    r.style.display = 'block';
  }
}
document.getElementById('u').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('s').focus(); });
document.getElementById('s').addEventListener('keydown', function(e){ if(e.key==='Enter') testar(); });
</script>
</body>
</html>
