<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teste isolado de upload — OBPC</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem;line-height:1.6}
h1{font-size:1.1rem;color:#93c5fd}
button{background:#3B9BD6;color:#fff;border:none;border-radius:8px;padding:.8rem 1.2rem;font-size:1rem;font-weight:700;cursor:pointer;margin:.4rem 0}
button:disabled{opacity:.5}
#log{background:#000;border-radius:8px;padding:1rem;margin-top:1rem;font-family:monospace;font-size:.82rem;white-space:pre-wrap;word-break:break-word;min-height:120px}
.ok{color:#4ade80}
.erro{color:#f87171}
.info{color:#93c5fd}
input[type=file]{color:#e2e8f0}
</style>
</head>
<body>
<h1>🔬 Teste isolado — envio direto pro Cloudinary</h1>
<p>Essa página não usa nada do painel. Ela testa, sozinha, se dá pra falar com o Cloudinary a partir deste celular/internet agora.</p>

<button onclick="testarConexao()">1️⃣ Testar conexão com o Cloudinary</button>
<br>
<button onclick="testarOutrosDominios()">🔎 Testar outros sites (comparação)</button>
<br>
<label>2️⃣ Escolha um vídeo curto (10-30 segundos) pra testar o envio de verdade:</label><br>
<input type="file" id="arquivo" accept="video/*"><br>
<button onclick="testarUpload()" id="btnUp">Testar envio deste vídeo</button>
<br>
<button onclick="testarUploadGenerico()" id="btnUpGen">🧪 Testar envio pra OUTRO serviço (não-Cloudinary)</button>
<br>
<button onclick="testarUploadXHR()" id="btnUpXHR">🆚 Testar envio pro Cloudinary com XMLHttpRequest (método antigo)</button>

<div id="log">Aguardando teste...</div>

<script>
var CLOUD_NAME='dvvxiri22';
var PRESET='obpc_media';
var logEl=document.getElementById('log');
function log(msg,tipo){
  var span=document.createElement('div');
  span.className=tipo||'';
  span.textContent=msg;
  logEl.appendChild(span);
  logEl.scrollTop=logEl.scrollHeight;
}
function limparLog(){logEl.innerHTML='';}

async function testarOutrosDominios(){
  limparLog();
  log('⏳ Testando vários sites diferentes pra comparar...','info');
  var testes=[
    {nome:'Google',url:'https://www.google.com/generate_204'},
    {nome:'jsDelivr (CDN)',url:'https://cdn.jsdelivr.net/npm/react/package.json'},
    {nome:'GitHub (onde o site mora)',url:'https://api.github.com'},
    {nome:'Cloudinary',url:'https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/resources/image?max_results=1'},
    {nome:'ImgBB (outro serviço de imagem)',url:'https://api.imgbb.com'}
  ];
  for(var i=0;i<testes.length;i++){
    var t=testes[i];
    var inicio=Date.now();
    try{
      await fetch(t.url,{method:'GET',mode:'no-cors'});
      var tempo=Date.now()-inicio;
      log('✅ '+t.nome+' — respondeu em '+tempo+'ms','ok');
    }catch(e){
      var tempo=Date.now()-inicio;
      log('❌ '+t.nome+' — FALHOU em '+tempo+'ms ('+(e&&e.message||e)+')','erro');
    }
  }
  log('---','info');
  log('Se só o Cloudinary falhou e os outros funcionaram: é bloqueio específico dele (ad-blocker do navegador, DNS, ou operadora bloqueando esse domínio).','info');
  log('Se TODOS falharam: o navegador/rede está bloqueando conexões de um jeito geral (não é culpa do Cloudinary).','info');
}

async function testarConexao(){
  limparLog();
  log('⏳ Testando se este celular consegue alcançar o Cloudinary...','info');
  var inicio=Date.now();
  try{
    var resp=await fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/resources/image?max_results=1',{method:'GET'});
    var tempo=Date.now()-inicio;
    log('✅ Conseguiu conectar! (respondeu em '+tempo+'ms)','ok');
    log('Status HTTP: '+resp.status+' '+resp.statusText,'info');
    var texto=await resp.text();
    log('Resposta (esperado é erro 401, é normal — só confirma que chegou lá): '+texto.slice(0,300),'info');
  }catch(e){
    var tempo=Date.now()-inicio;
    log('❌ NÃO conseguiu conectar ao Cloudinary! (falhou após '+tempo+'ms)','erro');
    log('Erro exato do navegador: '+(e&&e.message||e),'erro');
    log('Isso indica que ALGO está bloqueando o acesso a api.cloudinary.com nesta rede/celular agora (firewall, operadora, modo economia de dados, VPN, DNS).','erro');
  }
}

async function testarUpload(){
  var inp=document.getElementById('arquivo');
  var f=inp.files[0];
  if(!f){log('⚠️ Escolha um arquivo de vídeo primeiro.','erro');return;}
  limparLog();
  log('📄 Arquivo: '+f.name+' ('+(Math.round(f.size/1024/1024*10)/10)+' MB)','info');
  log('⏳ Enviando direto pro Cloudinary (sem compressão, sem pedaços — teste cru, limite de 30s)...','info');
  document.getElementById('btnUp').disabled=true;
  var inicio=Date.now();
  var ctrl=new AbortController();
  var timeoutId=setTimeout(function(){ctrl.abort();},30000);
  try{
    var fd=new FormData();
    fd.append('file',f);
    fd.append('upload_preset',PRESET);
    fd.append('folder','obpc_sao_fernando/teste');
    var resp=await fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/video/upload',{method:'POST',body:fd,signal:ctrl.signal});
    clearTimeout(timeoutId);
    var tempo=Date.now()-inicio;
    var texto=await resp.text();
    if(resp.ok){
      log('✅ SUCESSO! Upload funcionou. (levou '+(tempo/1000).toFixed(1)+'s)','ok');
      try{
        var data=JSON.parse(texto);
        log('URL do vídeo: '+data.secure_url,'ok');
      }catch(e){}
    }else{
      log('❌ Cloudinary RECUSOU o envio. Status HTTP: '+resp.status,'erro');
      log('Resposta completa: '+texto,'erro');
    }
  }catch(e){
    clearTimeout(timeoutId);
    var tempo=Date.now()-inicio;
    if(e&&e.name==='AbortError'){
      log('❌ TRAVOU — sem nenhuma resposta em 30 segundos. (abortado após '+(tempo/1000).toFixed(1)+'s)','erro');
      log('O pedido foi enviado mas nunca voltou resposta nenhuma — nem sucesso, nem erro.','erro');
    }else{
      log('❌ FALHA DE REDE ao tentar enviar (após '+(tempo/1000).toFixed(1)+'s).','erro');
      log('Erro exato do navegador: '+(e&&e.message||e),'erro');
    }
  }
  document.getElementById('btnUp').disabled=false;
}

async function testarUploadXHR(){
  var inp=document.getElementById('arquivo');
  var f=inp.files[0];
  if(!f){log('⚠️ Escolha um arquivo de vídeo primeiro (mesmo campo acima).','erro');return;}
  limparLog();
  log('📄 Arquivo: '+f.name+' ('+(Math.round(f.size/1024/1024*10)/10)+' MB)','info');
  log('⏳ Enviando pro Cloudinary usando XMLHttpRequest (o método antigo, clássico)...','info');
  document.getElementById('btnUpXHR').disabled=true;
  var inicio=Date.now();
  var xhr=new XMLHttpRequest();
  var fd=new FormData();
  fd.append('file',f);
  fd.append('upload_preset',PRESET);
  fd.append('folder','obpc_sao_fernando/teste');
  xhr.open('POST','https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/video/upload');
  xhr.timeout=60000;
  xhr.upload.onprogress=function(e){
    if(e.lengthComputable){
      log('⬆️ Progresso: '+Math.round(e.loaded/e.total*100)+'%','info');
    }
  };
  xhr.onload=function(){
    var tempo=Date.now()-inicio;
    document.getElementById('btnUpXHR').disabled=false;
    try{
      var data=JSON.parse(xhr.responseText);
      if(data.secure_url){
        log('✅ SUCESSO com XMLHttpRequest! (levou '+(tempo/1000).toFixed(1)+'s)','ok');
        log('URL do vídeo: '+data.secure_url,'ok');
        log('CONFIRMADO: o problema é específico do método "fetch" — XMLHttpRequest funciona nesta rede/computador!','ok');
      }else{
        log('❌ Cloudinary recusou. Status: '+xhr.status,'erro');
        log('Resposta: '+xhr.responseText,'erro');
      }
    }catch(e){
      log('❌ Resposta inválida. Status: '+xhr.status,'erro');
    }
  };
  xhr.onerror=function(){
    var tempo=Date.now()-inicio;
    document.getElementById('btnUpXHR').disabled=false;
    log('❌ Erro de rede com XMLHttpRequest (após '+(tempo/1000).toFixed(1)+'s).','erro');
  };
  xhr.ontimeout=function(){
    document.getElementById('btnUpXHR').disabled=false;
    log('❌ TRAVOU também com XMLHttpRequest — sem resposta em 60s.','erro');
    log('Isso indicaria que nem trocar o método resolve — o bloqueio pega os dois.','erro');
  };
  xhr.send(fd);
}

async function testarUploadGenerico(){
  var inp=document.getElementById('arquivo');
  var f=inp.files[0];
  if(!f){log('⚠️ Escolha um arquivo de vídeo primeiro (mesmo campo do teste acima).','erro');return;}
  limparLog();
  log('📄 Arquivo: '+f.name+' ('+(Math.round(f.size/1024/1024*10)/10)+' MB)','info');
  log('⏳ Enviando o MESMO arquivo pro httpbin.org (serviço de teste, NÃO é Cloudinary) — limite 30s...','info');
  document.getElementById('btnUpGen').disabled=true;
  var inicio=Date.now();
  var ctrl=new AbortController();
  var timeoutId=setTimeout(function(){ctrl.abort();},30000);
  try{
    var fd=new FormData();
    fd.append('file',f);
    var resp=await fetch('https://httpbin.org/post',{method:'POST',body:fd,signal:ctrl.signal});
    clearTimeout(timeoutId);
    var tempo=Date.now()-inicio;
    if(resp.ok){
      log('✅ SUCESSO! Conseguiu enviar pro httpbin.org em '+(tempo/1000).toFixed(1)+'s.','ok');
      log('Isso prova que o envio de arquivo FUNCIONA nesta rede/computador — o problema é específico do Cloudinary.','info');
    }else{
      log('❌ httpbin.org recusou. Status: '+resp.status,'erro');
    }
  }catch(e){
    clearTimeout(timeoutId);
    var tempo=Date.now()-inicio;
    if(e&&e.name==='AbortError'){
      log('❌ TRAVOU também no httpbin.org — sem resposta em 30s.','erro');
      log('Isso indica que o bloqueio é GERAL (qualquer envio de arquivo), não é culpa do Cloudinary — provavelmente antivírus, firewall ou proxy bloqueando uploads nesta rede/computador.','erro');
    }else{
      log('❌ Falha de rede: '+(e&&e.message||e),'erro');
    }
  }
  document.getElementById('btnUpGen').disabled=false;
}
</script>
</body>
</html>
